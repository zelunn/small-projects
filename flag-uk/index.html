<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/flag-uk/styles.css">
    <title>UK Flag</title>
</head>
<body>
    <h1>UK Flag</h1>

    <div id="uk-flag">

        <div class="outter-slash">
            <div class="slash"></div>
        </div>
        
        <div class="outter-slash position-1">
            <div class="slash rotate"></div> 
        </div>

        <div class="outter-slash position-2">
            <div class="slash rotate-1"></div> 
        </div>

        <div class="outter-slash position-3">
            <div class="slash rotate-2"></div> 
        </div>

        <div class="white-line">
        </div>

        <div class="white-line-2">
        </div>

        <div class="red-line">
        </div>

        <div class="red-line-2">
        </div>
    </div>

    <div></div>
</body>
</html>
